<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路线预览 - ViewEye</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="./css/map.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ViewEye</a>
            <div class="nav-actions">
                <a href="login.html" class="login-btn" id="navBtn">登入</a>
            </div>
        </div>
    </nav>

    <div id="map"></div>

    <!-- 实时导航栏 -->
    <div id="nav-panel" class="nav-hidden">
        <div class="nav-header">
            <div class="nav-brief">
                <span id="nav-status">上一站: XXX</span>
                <span id="nav-next">下一站: 加載中</span>
            </div>
            <button id="stop-nav-btn">退出</button>
        </div>
        <div class="nav-content">
            <!-- 导航详情 -->
            <div class="nav-details">
                <p>導航詳細指令預留區域</p>
            </div>
        </div>
        <div class="nav-handle">
            <div class="handle-bar"></div>
        </div>
    </div>

    <!-- AI 聊天功能 -->
    <div id="ai-container" class="ai-collapsed">
        <button id="ai-toggle-btn" title="AI 助手">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </button>
        <div class="ai-chat-box">
            <div class="ai-input-wrapper">
                <input type="text" id="ai-input" placeholder="問問 AI 旅遊建議...">
                <button id="ai-send-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div id="ai-response-area" class="hidden">
                <div class="ai-loading hidden">
                    <div class="dot-flashing"></div>
                </div>
                <div id="ai-response-text"></div>
            </div>
        </div>
    </div>

    <!-- 地图控制按钮 -->
    <div class="map-controls">
        <div class="zoom-controls">
            <button id="zoom-in" title="放大">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button id="zoom-out" title="缩小">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
        <button id="locate-user" title="定位到我的位置">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </button>
    </div>

    <!-- 桌面端专用的悬浮触发按钮 -->
    <button id="desktop-fab" class="desktop-only">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>

    <div id="info-card" class="collapsed">
        <div class="card-handle">
            <div class="handle-bar"></div>
        </div>
        <h2 id="toggle-card" class="desktop-only">×</h2>
        <div class="card-content">
            <h2 class="card-title">地點及綫路</h2>
            <div class="card-body">
                <h3>優選綫路</h3>
                <div id="routes"></div>
                <h3>優選地點</h3>
                <div id="locations"></div>
                <!-- 手机端底部空白占位符 -->
                <div class="mobile-bottom-spacer"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="js/map.js" type="module"></script>
</body>
</html>
