<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>地点 - ViewEye</title>
    <link rel="stylesheet" href="css/site.css" />
</head>
<body class="site-page">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ViewEye</a>
            <div class="nav-actions">
                <a href="login.html" class="login-btn" id="navBtn">登入</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <section class="site-hero" aria-label="地点介绍">
            <h1 class="site-title" id="siteTitle">地点名称</h1>
            <p class="site-description" id="siteDescription">地点简介</p>
        </section>

        <section class="carousel" aria-label="图片浏览">
            <div class="carousel-frame">
                <img id="carouselImg" alt="地点图片" />
                <button class="carousel-btn prev" id="prevImgBtn" type="button" title="上一张">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="carousel-btn next" id="nextImgBtn" type="button" title="下一张">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
            <div class="carousel-meta">
                <span id="imgCounter">0 / 0</span>
            </div>
        </section>

        <section class="site-body" aria-label="正文">
            <div style="display: flex; flex-direction: row; gap: 0.8rem" id="special-icons"></div>
            <div class="site-text" id="siteText"></div>
        </section>
    </main>

    <div id="ai-container" class="ai-collapsed">
        <button id="ai-toggle-btn" title="AI 助手">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                <text x="12" y="11.5" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle" dominant-baseline="middle">AI</text>
            </svg>
        </button>
        <div class="ai-chat-box">
            <div class="ai-input-wrapper">
                <input type="text" id="ai-input" placeholder="問問 AI 旅遊建議..." />
                <button id="ai-random-btn" title="隨機提示" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                        <circle cx="15.5" cy="15.5" r="1.5" fill="currentColor"/>
                        <circle cx="15.5" cy="8.5" r="1.5" fill="currentColor"/>
                        <circle cx="8.5" cy="15.5" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                    </svg>
                </button>
                <button id="ai-send-btn" type="button" title="發送">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div id="ai-response-area" class="hidden">
                <div id="ai-response-text"></div>
                <div class="ai-loading hidden">
                    <div class="dot-flashing"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/site.js"></script>
</body>
</html>
