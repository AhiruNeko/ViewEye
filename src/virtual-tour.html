<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° 虛擬旅行 - ViewEye</title>
    <link rel="stylesheet" href="./css/virtual-tour.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ViewEye</a>
            <div class="nav-actions">
                <a href="login.html" class="login-btn" id="navBtn">登入</a>
            </div>
        </div>
    </nav>

    <main class="tour-shell">
        <div class="tour-stage">
            <iframe 
                id="pano-player"
                src="https://app.cloudpano.com/tours/LfdIOTJSE" 
                width="100%" 
                height="100%" 
                style="border: 0;" 
                allow="gyroscope; accelerometer; xr-spatial-tracking; fullscreen">
            </iframe>
        </div>
    </main>

    <script src="js/virtual-tour.js" type="module"></script>

</html>
